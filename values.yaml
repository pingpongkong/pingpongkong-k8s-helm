# pingpongkong-state repository API. The collector reads:
# - k8s/{{ .Values.clusterName }}.yaml
# - notification/discord.yaml
# If the cluster-specific k8s file returns 404, the collector falls back to
# k8s/default.yaml.
clusterName: "sample-cluster"
repoApiUrl: "https://gitlab.company.com/api/v4/projects/123/repository/files"

collector:
  image:
    repository: your-registry/pingpongkong-k8s-collector
    tag: latest
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# --- Agent Settings ---
agent:
  image:
    repository: your-registry/pingpongkong-k8s-agent
    tag: latest
  resources:
    requests:
      cpu: 10m
      memory: 20Mi
    limits:
      cpu: 100m
      memory: 64Mi

# --- Authentication ---
# DO NOT commit your actual token here! Pass it via CLI during installation.
auth:
  gitToken: ""
