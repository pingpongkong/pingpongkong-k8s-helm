# pingpongkong-state Git repository. The collector reads:
# - k8s/{{ .Values.CONFIG_GIT_CLUSTERNAME }}.yaml
# - notification/discord.yaml
# and derives provider-specific raw file URLs from the repository HEAD/default branch.
CONFIG_GIT_URL: "https://gitlab.company.com/group/pingpongkong-state"
CONFIG_GIT_TOKEN: ""
CONFIG_GIT_CLUSTERNAME: "sample-cluster"
LOG_LEVEL: INFO
COLLECTOR_UPDATE_INTERVAL: 5m
AGENT_CHECK_INTERVAL: 5m
AGENT_API_PORT: 8080
COLLECTOR_API_PORT: 8081

collector:
  image:
    repository: kimc1992/pingpongkong-k8s-collector
    tag: v0.0.7
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# --- Agent Settings ---
agent:
  image:
    repository: kimc1992/pingpongkong-k8s-agent
    tag: v0.0.7
  resources:
    requests:
      cpu: 10m
      memory: 20Mi
    limits:
      cpu: 100m
      memory: 64Mi
