apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ppk.fullname" . }}-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ppk.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ppk.fullname" . }}-agent
  labels:
    {{- include "ppk.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ppk.fullname" . }}-agent
  labels:
    {{- include "ppk.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ppk.fullname" . }}-agent
subjects:
  - kind: ServiceAccount
    name: {{ include "ppk.fullname" . }}-agent
    namespace: {{ .Release.Namespace }}
