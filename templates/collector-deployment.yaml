{{- $name := default .Chart.Name .Values.nameOverride | trunc 63 | trimSuffix "-" -}}
{{- $fullname := "" -}}
{{- if .Values.fullnameOverride -}}
{{- $fullname = .Values.fullnameOverride | trunc 63 | trimSuffix "-" -}}
{{- else if contains $name .Release.Name -}}
{{- $fullname = .Release.Name | trunc 63 | trimSuffix "-" -}}
{{- else -}}
{{- $fullname = printf "%s-%s" .Release.Name $name | trunc 63 | trimSuffix "-" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-collector
  namespace: {{ .Release.Namespace }}
  labels:
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: collector
    spec:
      serviceAccountName: {{ $fullname }}-collector
      containers:
        - name: collector
          image: "{{ .Values.collector.image.repository }}:{{ .Values.collector.image.tag }}"
          ports:
            - containerPort: {{ .Values.COLLECTOR_API_PORT }}
          env:
            - name: LOG_LEVEL
              value: {{ .Values.LOG_LEVEL | quote }}
            - name: CONFIG_GIT_URL
              value: {{ .Values.CONFIG_GIT_URL | quote }}
            - name: K8S_CLUSTERNAME
              value: {{ .Values.K8S_CLUSTERNAME | quote }}
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: COLLECTOR_UPDATE_INTERVAL
              value: {{ .Values.COLLECTOR_UPDATE_INTERVAL | quote }}
            - name: AGENT_CHECK_INTERVAL
              value: {{ .Values.AGENT_CHECK_INTERVAL | quote }}
            - name: AGENT_API_PORT
              value: {{ .Values.AGENT_API_PORT | quote }}
            - name: COLLECTOR_API_PORT
              value: {{ .Values.COLLECTOR_API_PORT | quote }}
            - name: CONFIG_GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-auth
                  key: git-token
          resources:
            {{- toYaml .Values.collector.resources | nindent 12 }}
