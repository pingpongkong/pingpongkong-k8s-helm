apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}-agent
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}-agent
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-agent
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: {{ .Release.Name }}-agent-sa
      tolerations:
        - operator: "Exists"
      containers:
        - name: agent
          image: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}"
          ports:
            - containerPort: 8080
              hostPort: 8080
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Magically route to the Collector service
            - name: COLLECTOR_URL
              value: "http://{{ .Release.Name }}-collector.{{ .Release.Namespace }}.svc.cluster.local:8080/matrix"
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}